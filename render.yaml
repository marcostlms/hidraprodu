# Render.com Blueprint - deploy automatico de TUDO (backend + frontend) numa unica conta
# Banco de dados continua no MongoDB Atlas (free M0), pois o Render nao oferece Mongo gratuito.
# Uso: Render Dashboard > New > Blueprint > selecione este repositorio.
# Variaveis marcadas com "sync: false" devem ser preenchidas manualmente
# no painel do Render apos a criacao dos servicos (Environment).
services:
  # ---------------- Backend (FastAPI) ----------------
  - type: web
    name: hidrara-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: hidrara
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@hidrara.com.br
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_NAME
        value: hidrara
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_BACKEND
        value: local
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

  # ---------------- Frontend (React, servido como site estatico) ----------------
  - type: web
    name: hidrara-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
